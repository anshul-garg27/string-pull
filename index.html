<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>String Pull</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
    canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
    video { display: none; }

    #loading {
      position: fixed; inset: 0; background: #0a0a0a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; color: #fff; transition: opacity 0.6s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader {
      width: 50px; height: 50px;
      border: 3px solid rgba(255,255,255,0.06); border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; opacity: 0.4; }

    #hint {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 1px;
      pointer-events: none; z-index: 10; transition: opacity 0.8s;
      text-align: center;
    }

    #controls {
      position: fixed; bottom: 14px; right: 14px; z-index: 20;
      display: flex; gap: 6px; align-items: center;
    }
    .btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: #fff; padding: 6px 12px; border-radius: 16px; font-size: 10px;
      cursor: pointer; backdrop-filter: blur(8px); transition: all 0.2s;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .btn:hover { background: rgba(255,255,255,0.16); }
    .btn.active { background: rgba(59,130,246,0.4); border-color: rgba(59,130,246,0.5); }
    .btn.rec-on { background: rgba(255,50,50,0.5); border-color: rgba(255,50,50,0.6); }

    #rec-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #f00;
      display: none; animation: pulse 1s infinite;
    }
    #rec-dot.on { display: block; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    #set-label {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      pointer-events: none; z-index: 10; transition: all 0.3s;
    }
  </style>
</head>
<body>
  <div id="loading"><div class="loader"></div><p>Loading hand tracking...</p></div>
  <canvas id="canvas"></canvas>
  <video id="video" playsinline></video>
  <div id="hint">Raise your hand — strings connect to objects &nbsp;|&nbsp; Fist = pull &nbsp;|&nbsp; Open palm = explode &nbsp;|&nbsp; Tab = switch set</div>
  <div id="set-label">BALLS</div>
  <div id="controls">
    <div id="rec-dot"></div>
    <button class="btn" id="btn-rec">REC</button>
    <button class="btn" id="btn-snap">SNAP</button>
    <button class="btn" id="btn-sound">SOUND ON</button>
    <button class="btn" id="btn-set">NEXT SET</button>
    <button class="btn" id="btn-reset">RESET</button>
  </div>

  <script type="module">
    // Load Matter.js dynamically to avoid module/global scope issues
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load Matter.js'));
      document.head.appendChild(s);
    });

    const { FilesetResolver, HandLandmarker } = await import(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs'
    );

    // ═══════════════════════════════════════════════════
    //  CONFIG
    // ═══════════════════════════════════════════════════
    const CFG = {
      numObjects: 8,
      gravity: 0.8,
      bounce: 0.6,
      friction: 0.02,
      springStiffness: 0.004,
      springDamping: 0.04,
      fistForce: 0.06,
      palmForce: 0.12,
      flickMultiplier: 30,
      flickThreshold: 0.025,
      emaLandmark: 0.4,
      wallThickness: 60,
      trailLength: 8,
      stringColor: 'rgba(255,255,255,0.4)',
      stringGlow: 'rgba(100,160,255,0.25)',
    };

    const FINGER_TIPS = [4, 8, 12, 16, 20]; // thumb, index, middle, ring, pinky
    const FINGER_COLORS = ['#f97316','#3b82f6','#a855f7','#22c55e','#ec4899'];
    const FINGER_NAMES = ['thumb','index','middle','ring','pinky'];

    // Object sets
    const SETS = [
      { name: 'BALLS', gen: (i,n) => ({ type:'circle', radius: 18+Math.random()*14, color: FINGER_COLORS[i%5], emoji: null }) },
      { name: 'EMOJI', gen: (i,n) => ({ type:'circle', radius: 22, color: '#333', emoji: ['🔥','⭐','💎','🎵','🌈','🍕','👾','💫'][i%8] }) },
      { name: 'LETTERS', gen: (i,n) => ({ type:'circle', radius: 20, color: '#333', emoji: 'STRINGPULL'[i%10] || 'X', isLetter: true }) },
      { name: 'PLANETS', gen: (i,n) => ({ type:'circle', radius: 12+i*4, color: ['#ff6b35','#4ecdc4','#45b7d1','#f7dc6f','#bb8fce','#85c1e9','#abebc6','#f1948a'][i%8], emoji: null }) },
    ];

    // ═══════════════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════════════
    const S = {
      handVisible: false,
      fingerTips: Array(5).fill(null).map(() => ({x:0,y:0})),
      prevFingerTips: Array(5).fill(null).map(() => ({x:0,y:0})),
      smoothFingerTips: Array(5).fill(null).map(() => ({x:0,y:0})),
      isFist: false,
      isOpenPalm: false,
      palmCenter: {x:0,y:0},
      smoothLm: null,
      lastFrame: 0,
      currentSet: 0,
      soundOn: false,
      recording: false,
      recorder: null,
      chunks: [],
      trails: [], // per-object trail history
      stringOpacity: 0, // fade in strings when hand appears
    };

    // ═══════════════════════════════════════════════════
    //  CANVAS & VIDEO
    // ═══════════════════════════════════════════════════
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video');
    let W, H;

    let physicsReady = false;
    function resize() {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
      if (physicsReady) rebuildWalls();
    }
    resize();
    addEventListener('resize', resize);

    // ═══════════════════════════════════════════════════
    //  MATTER.JS PHYSICS
    // ═══════════════════════════════════════════════════
    const { Engine, Bodies, Body, World, Composite, Events } = window.Matter;
    const engine = Engine.create({ gravity: { x: 0, y: CFG.gravity } });
    const world = engine.world;

    let walls = [];
    let objects = [];
    let objectMeta = []; // visual metadata per object

    function rebuildWalls() {
      if (walls.length) Composite.remove(world, walls);
      const t = CFG.wallThickness;
      walls = [
        Bodies.rectangle(W/2, -t/2, W+t*2, t, { isStatic: true, restitution: CFG.bounce }),
        Bodies.rectangle(W/2, H+t/2, W+t*2, t, { isStatic: true, restitution: CFG.bounce }),
        Bodies.rectangle(-t/2, H/2, t, H+t*2, { isStatic: true, restitution: CFG.bounce }),
        Bodies.rectangle(W+t/2, H/2, t, H+t*2, { isStatic: true, restitution: CFG.bounce }),
      ];
      Composite.add(world, walls);
    }

    function spawnObjects() {
      // Remove old
      if (objects.length) Composite.remove(world, objects);
      objects = [];
      objectMeta = [];
      S.trails = [];

      const set = SETS[S.currentSet];
      for (let i = 0; i < CFG.numObjects; i++) {
        const meta = set.gen(i, CFG.numObjects);
        const x = W * 0.2 + Math.random() * W * 0.6;
        const y = H * 0.2 + Math.random() * H * 0.4;

        const body = Bodies.circle(x, y, meta.radius, {
          restitution: CFG.bounce,
          friction: CFG.friction,
          frictionAir: 0.01,
          density: 0.002,
        });
        objects.push(body);
        objectMeta.push(meta);
        S.trails.push([]);
      }
      Composite.add(world, objects);
    }

    // Collision events for sound
    Events.on(engine, 'collisionStart', (event) => {
      for (const pair of event.pairs) {
        const speed = Math.sqrt(
          Math.pow(pair.bodyA.velocity.x - pair.bodyB.velocity.x, 2) +
          Math.pow(pair.bodyA.velocity.y - pair.bodyB.velocity.y, 2)
        );
        if (speed > 2) playCollision(Math.min(speed / 15, 1));
      }
    });

    physicsReady = true;
    rebuildWalls();
    spawnObjects();

    // ═══════════════════════════════════════════════════
    //  SOUND ENGINE
    // ═══════════════════════════════════════════════════
    let audioCtx = null, audioDest = null, noiseBuffer = null;

    function initAudio() {
      audioCtx = new AudioContext();
      audioDest = audioCtx.createMediaStreamDestination();
      noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
      const d = noiseBuffer.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    }

    function playCollision(intensity) {
      if (!audioCtx || !S.soundOn) return;
      const now = audioCtx.currentTime;
      // Percussive thud — lower pitch for harder hits
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80 + (1-intensity) * 200, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.12);
      gain.gain.setValueAtTime(intensity * 0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(gain).connect(audioCtx.destination);
      gain.connect(audioDest);
      osc.start(now); osc.stop(now + 0.2);
      // Click
      const n = audioCtx.createBufferSource();
      n.buffer = noiseBuffer;
      const ng = audioCtx.createGain();
      const nf = audioCtx.createBiquadFilter();
      nf.type = 'highpass'; nf.frequency.value = 2000;
      ng.gain.setValueAtTime(intensity * 0.06, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      n.connect(nf).connect(ng).connect(audioCtx.destination);
      ng.connect(audioDest);
      n.start(now); n.stop(now + 0.06);
    }

    function playFist() {
      if (!audioCtx || !S.soundOn) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.25);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.3);
      osc.connect(gain).connect(audioCtx.destination);
      gain.connect(audioDest);
      osc.start(now); osc.stop(now + 0.35);
    }

    function playExplode() {
      if (!audioCtx || !S.soundOn) return;
      const now = audioCtx.currentTime;
      // Low boom
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(100, now);
      osc.frequency.exponentialRampToValueAtTime(25, now + 0.4);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(gain).connect(audioCtx.destination);
      gain.connect(audioDest);
      osc.start(now); osc.stop(now + 0.5);
      // Noise burst
      const n = audioCtx.createBufferSource();
      n.buffer = noiseBuffer;
      const ng = audioCtx.createGain();
      const nf = audioCtx.createBiquadFilter();
      nf.type = 'bandpass'; nf.frequency.value = 600; nf.Q.value = 0.5;
      ng.gain.setValueAtTime(0.1, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      n.connect(nf).connect(ng).connect(audioCtx.destination);
      ng.connect(audioDest);
      n.start(now); n.stop(now + 0.35);
    }

    function playFlick() {
      if (!audioCtx || !S.soundOn) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(500, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.12);
      osc.connect(gain).connect(audioCtx.destination);
      gain.connect(audioDest);
      osc.start(now); osc.stop(now + 0.15);
    }

    // ═══════════════════════════════════════════════════
    //  MEDIAPIPE
    // ═══════════════════════════════════════════════════
    let handLandmarker = null, lastVidTime = -1;

    async function initMP() {
      const v = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');
      handLandmarker = await HandLandmarker.createFromOptions(v, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
          delegate: 'GPU',
        },
        runningMode: 'VIDEO', numHands: 1,
        minHandDetectionConfidence: 0.6, minHandPresenceConfidence: 0.6, minTrackingConfidence: 0.5,
      });
    }

    async function startCam() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      await video.play();
      document.getElementById('loading').classList.add('hidden');
      setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 8000);
      loop();
    }

    function loop() {
      if (video.currentTime !== lastVidTime && handLandmarker) {
        lastVidTime = video.currentTime;
        processHands(handLandmarker.detectForVideo(video, performance.now()));
      }
      requestAnimationFrame(loop);
    }

    // ═══════════════════════════════════════════════════
    //  HAND PROCESSING
    // ═══════════════════════════════════════════════════
    function ema(prev, curr, a) {
      if (!prev) return curr.map(l => ({...l}));
      return curr.map((l,i) => ({
        x: prev[i].x*(1-a)+l.x*a,
        y: prev[i].y*(1-a)+l.y*a,
        z: prev[i].z*(1-a)+l.z*a,
      }));
    }

    let prevFist = false, prevPalm = false;

    function processHands(res) {
      const hands = res.landmarks;
      if (!hands || !hands.length) {
        S.handVisible = false;
        S.smoothLm = null;
        return;
      }

      let lm = hands[0];
      S.smoothLm = ema(S.smoothLm, lm, CFG.emaLandmark);
      lm = S.smoothLm;

      S.handVisible = true;

      // Store previous for flick detection
      for (let i = 0; i < 5; i++) {
        S.prevFingerTips[i] = { ...S.smoothFingerTips[i] };
      }

      // Map fingertips to screen coordinates (mirrored)
      for (let i = 0; i < 5; i++) {
        const tip = lm[FINGER_TIPS[i]];
        S.fingerTips[i] = { x: (1 - tip.x) * W, y: tip.y * H };
        S.smoothFingerTips[i].x += (S.fingerTips[i].x - S.smoothFingerTips[i].x) * 0.4;
        S.smoothFingerTips[i].y += (S.fingerTips[i].y - S.smoothFingerTips[i].y) * 0.4;
      }

      // Palm center
      const wrist = lm[0], midBase = lm[9];
      S.palmCenter.x = (1 - (wrist.x + midBase.x) / 2) * W;
      S.palmCenter.y = ((wrist.y + midBase.y) / 2) * H;

      // Fist detection: all fingertips close to palm
      const palmLm = lm[9];
      let fistScore = 0;
      for (const fi of [8,12,16,20]) {
        const d = Math.hypot(lm[fi].x - palmLm.x, lm[fi].y - palmLm.y);
        if (d < 0.08) fistScore++;
      }
      S.isFist = fistScore >= 3;

      // Open palm: all fingers extended (tips above PIP joints)
      let openScore = 0;
      for (const [tip, pip] of [[8,6],[12,10],[16,14],[20,18]]) {
        if (lm[tip].y < lm[pip].y) openScore++;
      }
      // Also check finger spread
      const spread = Math.hypot(lm[8].x - lm[20].x, lm[8].y - lm[20].y);
      S.isOpenPalm = openScore >= 4 && spread > 0.15;

      // Trigger sounds on gesture change
      if (S.isFist && !prevFist) playFist();
      if (S.isOpenPalm && !prevPalm) playExplode();
      prevFist = S.isFist;
      prevPalm = S.isOpenPalm;

      // Flick detection per finger
      for (let i = 0; i < 5; i++) {
        const dx = S.smoothFingerTips[i].x - S.prevFingerTips[i].x;
        const dy = S.smoothFingerTips[i].y - S.prevFingerTips[i].y;
        const speed = Math.hypot(dx, dy) / W; // normalized
        if (speed > CFG.flickThreshold && i < objects.length) {
          Body.applyForce(objects[i], objects[i].position, {
            x: dx * CFG.flickMultiplier * 0.00001,
            y: dy * CFG.flickMultiplier * 0.00001,
          });
          playFlick();
        }
      }
    }

    // ═══════════════════════════════════════════════════
    //  PHYSICS STEP + FORCES
    // ═══════════════════════════════════════════════════
    function physicsStep(dt) {
      if (S.handVisible && !S.isFist && !S.isOpenPalm) {
        // Spring forces: each finger pulls its connected object
        for (let i = 0; i < Math.min(5, objects.length); i++) {
          const finger = S.smoothFingerTips[i];
          const obj = objects[i];
          const dx = finger.x - obj.position.x;
          const dy = finger.y - obj.position.y;
          const dist = Math.hypot(dx, dy);

          // Spring force (Hooke's law with damping)
          const fx = dx * CFG.springStiffness - obj.velocity.x * CFG.springDamping;
          const fy = dy * CFG.springStiffness - obj.velocity.y * CFG.springDamping;
          Body.applyForce(obj, obj.position, { x: fx, y: fy });
        }

        // Objects 5+ are connected to random fingers
        for (let i = 5; i < objects.length; i++) {
          const finger = S.smoothFingerTips[i % 5];
          const obj = objects[i];
          const dx = finger.x - obj.position.x;
          const dy = finger.y - obj.position.y;
          const fx = dx * CFG.springStiffness * 0.5 - obj.velocity.x * CFG.springDamping;
          const fy = dy * CFG.springStiffness * 0.5 - obj.velocity.y * CFG.springDamping;
          Body.applyForce(obj, obj.position, { x: fx, y: fy });
        }
      }

      if (S.handVisible && S.isFist) {
        // Pull ALL objects toward palm center
        for (const obj of objects) {
          const dx = S.palmCenter.x - obj.position.x;
          const dy = S.palmCenter.y - obj.position.y;
          Body.applyForce(obj, obj.position, {
            x: dx * CFG.fistForce * 0.001,
            y: dy * CFG.fistForce * 0.001,
          });
        }
      }

      if (S.handVisible && S.isOpenPalm) {
        // Explode ALL objects away from palm center
        for (const obj of objects) {
          const dx = obj.position.x - S.palmCenter.x;
          const dy = obj.position.y - S.palmCenter.y;
          const dist = Math.max(Math.hypot(dx, dy), 50);
          Body.applyForce(obj, obj.position, {
            x: (dx / dist) * CFG.palmForce * 0.01,
            y: (dy / dist) * CFG.palmForce * 0.01,
          });
        }
      }

      Engine.update(engine, 16.67 * dt);
    }

    // ═══════════════════════════════════════════════════
    //  RENDER
    // ═══════════════════════════════════════════════════
    let time = 0;

    function render() {
      requestAnimationFrame(render);
      const now = performance.now();
      const dt = Math.min((now - (S.lastFrame || now)) / 16.67, 3);
      S.lastFrame = now;
      time += 0.016 * dt;

      physicsStep(dt);

      ctx.clearRect(0, 0, W, H);

      // Camera feed (mirrored)
      ctx.save(); ctx.translate(W, 0); ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, W, H); ctx.restore();

      // Slight darken for contrast
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(0, 0, W, H);

      // String opacity fade in/out
      S.stringOpacity += ((S.handVisible ? 1 : 0) - S.stringOpacity) * 0.08 * dt;

      // ── UPDATE TRAILS ──
      for (let i = 0; i < objects.length; i++) {
        const obj = objects[i];
        const speed = Math.hypot(obj.velocity.x, obj.velocity.y);
        if (speed > 2) {
          S.trails[i].push({ x: obj.position.x, y: obj.position.y, life: 1 });
        }
        // Age trails
        for (let j = S.trails[i].length - 1; j >= 0; j--) {
          S.trails[i][j].life -= 0.04 * dt;
          if (S.trails[i][j].life <= 0) S.trails[i].splice(j, 1);
        }
        if (S.trails[i].length > CFG.trailLength) S.trails[i].shift();
      }

      // ── DRAW TRAILS ──
      for (let i = 0; i < objects.length; i++) {
        const meta = objectMeta[i];
        const trail = S.trails[i];
        if (trail.length < 2) continue;
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        for (let j = 1; j < trail.length; j++) {
          ctx.beginPath();
          ctx.moveTo(trail[j-1].x, trail[j-1].y);
          ctx.lineTo(trail[j].x, trail[j].y);
          ctx.strokeStyle = meta.color;
          ctx.globalAlpha = trail[j].life * 0.3;
          ctx.lineWidth = meta.radius * 0.4 * trail[j].life;
          ctx.stroke();
        }
        ctx.restore();
      }

      // ── DRAW STRINGS ──
      if (S.stringOpacity > 0.01) {
        ctx.save();
        ctx.globalAlpha = S.stringOpacity;

        for (let i = 0; i < objects.length; i++) {
          const fingerIdx = i < 5 ? i : i % 5;
          const finger = S.smoothFingerTips[fingerIdx];
          const obj = objects[i];
          const ox = obj.position.x, oy = obj.position.y;

          // Distance for tension
          const dist = Math.hypot(finger.x - ox, finger.y - oy);
          const tension = Math.min(dist / 300, 1); // 0=slack, 1=taut

          // Catenary curve (drooping string)
          const midX = (finger.x + ox) / 2;
          const sag = (1 - tension) * 60 + 15; // more sag when slack
          const midY = (finger.y + oy) / 2 + sag;

          // String width based on tension
          const lineW = 1 + (1 - tension) * 1.5;

          // Draw string with glow
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          ctx.beginPath();
          ctx.moveTo(finger.x, finger.y);
          ctx.quadraticCurveTo(midX, midY, ox, oy);
          ctx.strokeStyle = CFG.stringGlow;
          ctx.lineWidth = lineW + 3;
          ctx.stroke();
          ctx.restore();

          // Main string
          ctx.beginPath();
          ctx.moveTo(finger.x, finger.y);
          ctx.quadraticCurveTo(midX, midY, ox, oy);
          ctx.strokeStyle = CFG.stringColor;
          ctx.lineWidth = lineW;
          ctx.stroke();

          // Vibration when taut
          if (tension > 0.6) {
            const vibAmp = tension * 3;
            const vibFreq = 20;
            ctx.beginPath();
            ctx.moveTo(finger.x, finger.y);
            const vmx = midX + Math.sin(time * vibFreq + i) * vibAmp;
            const vmy = midY + Math.cos(time * vibFreq * 0.7 + i) * vibAmp;
            ctx.quadraticCurveTo(vmx, vmy, ox, oy);
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }

          // Fingertip glow dot
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          const fGrad = ctx.createRadialGradient(finger.x, finger.y, 0, finger.x, finger.y, 12);
          fGrad.addColorStop(0, FINGER_COLORS[fingerIdx] + 'aa');
          fGrad.addColorStop(1, 'transparent');
          ctx.fillStyle = fGrad;
          ctx.fillRect(finger.x - 12, finger.y - 12, 24, 24);
          ctx.restore();
        }
        ctx.restore();
      }

      // ── DRAW OBJECTS ──
      for (let i = 0; i < objects.length; i++) {
        const obj = objects[i];
        const meta = objectMeta[i];
        const x = obj.position.x, y = obj.position.y;
        const r = meta.radius;

        if (meta.emoji || meta.isLetter) {
          // Emoji or letter
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(obj.angle);
          ctx.font = `${meta.isLetter ? 'bold ' : ''}${r * 1.4}px ${meta.isLetter ? "'Segoe UI', sans-serif" : 'sans-serif'}`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          if (meta.isLetter) {
            ctx.fillStyle = FINGER_COLORS[i % 5];
            ctx.shadowColor = FINGER_COLORS[i % 5];
            ctx.shadowBlur = 15;
          }
          ctx.fillText(meta.emoji, 0, 0);
          ctx.restore();
        } else {
          // Colored ball with shading
          ctx.save();
          const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
          grad.addColorStop(0, lighten(meta.color, 40));
          grad.addColorStop(0.7, meta.color);
          grad.addColorStop(1, darken(meta.color, 30));
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();

          // Subtle shadow
          ctx.beginPath();
          ctx.ellipse(x, y + r + 5, r * 0.7, 4, 0, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,0,0,0.15)';
          ctx.fill();

          // Glow
          ctx.globalCompositeOperation = 'lighter';
          const glow = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 1.8);
          glow.addColorStop(0, 'transparent');
          glow.addColorStop(0.5, meta.color + '10');
          glow.addColorStop(1, 'transparent');
          ctx.fillStyle = glow;
          ctx.fillRect(x - r*2, y - r*2, r*4, r*4);
          ctx.restore();
        }
      }

      // ── FIST / PALM INDICATOR ──
      if (S.handVisible && S.isFist) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        // Converging ring
        const pr = 40 + Math.sin(time * 8) * 10;
        ctx.beginPath();
        ctx.arc(S.palmCenter.x, S.palmCenter.y, pr, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(100,160,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }

      if (S.handVisible && S.isOpenPalm) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        // Expanding ring
        const er = 50 + ((time * 3) % 1) * 80;
        ctx.beginPath();
        ctx.arc(S.palmCenter.x, S.palmCenter.y, er, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,150,50,${0.3 - ((time * 3) % 1) * 0.3})`;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }
    }

    // ═══════════════════════════════════════════════════
    //  RECORDING
    // ═══════════════════════════════════════════════════
    function toggleRecord() {
      if (S.recording) stopRecord(); else startRecord();
    }
    function startRecord() {
      if (!audioCtx) initAudio();
      const vidStream = canvas.captureStream(30);
      const tracks = [vidStream.getVideoTracks()[0]];
      if (audioDest) tracks.push(audioDest.stream.getAudioTracks()[0]);
      const stream = new MediaStream(tracks);
      const types = ['video/webm; codecs=vp9,opus','video/webm',''];
      const mime = types.find(t => !t || MediaRecorder.isTypeSupported(t)) || '';
      S.recorder = new MediaRecorder(stream, { mimeType: mime || undefined, videoBitsPerSecond: 8_000_000 });
      S.chunks = [];
      S.recorder.ondataavailable = e => S.chunks.push(e.data);
      S.recorder.onstop = () => {
        const blob = new Blob(S.chunks, {type:'video/webm'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = `string-pull-${Date.now()}.webm`;
        a.click(); URL.revokeObjectURL(a.href);
      };
      S.recorder.start(); S.recording = true;
      document.getElementById('btn-rec').classList.add('rec-on');
      document.getElementById('btn-rec').textContent = 'STOP';
      document.getElementById('rec-dot').classList.add('on');
    }
    function stopRecord() {
      if (S.recorder) S.recorder.stop();
      S.recording = false;
      document.getElementById('btn-rec').classList.remove('rec-on');
      document.getElementById('btn-rec').textContent = 'REC';
      document.getElementById('rec-dot').classList.remove('on');
    }
    function takeSnap() {
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = `string-pull-${Date.now()}.png`;
      a.click();
    }

    // ═══════════════════════════════════════════════════
    //  CONTROLS
    // ═══════════════════════════════════════════════════
    function nextSet() {
      S.currentSet = (S.currentSet + 1) % SETS.length;
      document.getElementById('set-label').textContent = SETS[S.currentSet].name;
      spawnObjects();
    }

    document.getElementById('btn-rec').addEventListener('click', toggleRecord);
    document.getElementById('btn-snap').addEventListener('click', takeSnap);
    document.getElementById('btn-sound').addEventListener('click', () => {
      if (!audioCtx) initAudio();
      S.soundOn = !S.soundOn;
      document.getElementById('btn-sound').textContent = S.soundOn ? 'SOUND OFF' : 'SOUND ON';
      if (S.soundOn && audioCtx.state === 'suspended') audioCtx.resume();
    });
    document.getElementById('btn-set').addEventListener('click', nextSet);
    document.getElementById('btn-reset').addEventListener('click', spawnObjects);

    document.addEventListener('keydown', e => {
      if (e.code === 'Tab') { e.preventDefault(); nextSet(); }
      if (e.code === 'KeyR') spawnObjects();
    });

    // ═══════════════════════════════════════════════════
    //  UTIL
    // ═══════════════════════════════════════════════════
    function lighten(hex, pct) {
      const r = Math.min(255, parseInt(hex.slice(1,3),16) + pct);
      const g = Math.min(255, parseInt(hex.slice(3,5),16) + pct);
      const b = Math.min(255, parseInt(hex.slice(5,7),16) + pct);
      return `rgb(${r},${g},${b})`;
    }
    function darken(hex, pct) {
      const r = Math.max(0, parseInt(hex.slice(1,3),16) - pct);
      const g = Math.max(0, parseInt(hex.slice(3,5),16) - pct);
      const b = Math.max(0, parseInt(hex.slice(5,7),16) - pct);
      return `rgb(${r},${g},${b})`;
    }

    // ═══════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════
    (async () => {
      try {
        console.log('Initializing MediaPipe...');
        await initMP();
        console.log('MediaPipe ready. Starting camera...');
        await startCam();
        console.log('Camera started. Rendering...');
        render();
      } catch (err) {
        console.error('Init failed:', err);
        const loadEl = document.getElementById('loading');
        loadEl.textContent = '';
        const errP = document.createElement('p');
        errP.style.cssText = 'color:#f87171;font-size:14px;';
        errP.textContent = 'Error: ' + err.message;
        const hintP = document.createElement('p');
        hintP.style.cssText = 'color:#888;font-size:12px;margin-top:8px;';
        hintP.textContent = 'Check console. Make sure camera is allowed.';
        loadEl.appendChild(errP);
        loadEl.appendChild(hintP);
      }
    })();
  </script>
</body>
